

<div class="orders-container">
  <h2>Orders List</h2>

  <table>
    <tr>
      <th>ID</th>
      <th>Price</th>
      <th>Date</th>
      <th>Status</th>
    </tr>

    <tr *ngFor="let order of orders">
      <td>{{ order.id }}</td>
      <td>{{ order.price | currency:'INR' }}</td>
      <td>{{ order.date | date:'short' }}</td>
      <td>
        <span class="status">
          {{ order.status | orderStatus }}
        </span>
      </td>
    </tr>
  </table>
</div>
